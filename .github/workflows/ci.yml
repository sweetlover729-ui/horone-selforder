name: Horone SelfOrder CI/CD

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  backend-test:
    name: Backend Tests (pytest + Coverage)
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_selforder
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt
    
    - name: Install dependencies
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Initialize test database schema
      working-directory: backend
      env:
        PGPASSWORD: postgres
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_selforder
      run: |
        sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
        psql -h localhost -U postgres -d test_selforder -f tests/schema.sql -v ON_ERROR_STOP=1 -q
        psql -h localhost -U postgres -d test_selforder -f tests/seed_test_data.sql -v ON_ERROR_STOP=1 -q
        echo 'Schema + seed created successfully'
    
    - name: Run tests with coverage
      working-directory: backend
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_selforder
        FLASK_ENV: testing
        HORONE_ROOT: /tmp/horone-test
        PGUSER: postgres
        PGPASSWORD: postgres
        PGDATABASE: test_selforder
        PGHOST: localhost
        PGPORT: 5432
      run: |
        mkdir -p /tmp/horone-test/uploads/pdfs /tmp/horone-test/uploads/orders
        pytest tests/ -v --tb=short --cov=. --omit='tests/*' --cov-report=term-missing --cov-report=xml --cov-fail-under=100
    
    - name: Upload coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v4
      with:
        file: backend/coverage.xml
        fail_ci_if_error: false
      continue-on-error: true

  frontend-console-build:
    name: Frontend Console Build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend-console/package-lock.json
    
    - name: Install dependencies
      working-directory: frontend-console
      run: npm ci
    
    - name: Run tests (if available)
      working-directory: frontend-console
      run: npm test -- --passWithNoTests || true
    
    - name: Build
      working-directory: frontend-console
      run: npm run build
    
    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: console-dist
        path: dist/console/

  frontend-client-build:
    name: Frontend Client Build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      working-directory: frontend
      run: npm ci
    
    - name: Run tests (if available)
      working-directory: frontend
      run: npm test -- --passWithNoTests || true
    
    - name: Build
      working-directory: frontend
      run: npm run build
    
    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: client-dist
        path: dist/client/

  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install Python linting tools
      working-directory: backend
      run: |
        pip install flake8 black isort
    
    - name: Run flake8
      working-directory: backend
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install frontend linting tools
      run: |
        cd frontend-console && npm ci
        cd ../frontend && npm ci
    
    - name: Run ESLint (Console)
      working-directory: frontend-console
      run: npm run lint || true
    
    - name: Run ESLint (Client)
      working-directory: frontend
      run: npm run lint || true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Bandit (Python security linter)
      working-directory: backend
      run: |
        pip install bandit
        bandit -r . -ll || true
    
    - name: Run npm audit (Console)
      working-directory: frontend-console
      run: npm audit --production || true
    
    - name: Run npm audit (Client)
      working-directory: frontend
      run: npm audit --production || true

  deploy-staging:
    name: Deploy to Staging
    needs: [backend-test, frontend-console-build, frontend-client-build, lint-and-format]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    
    steps:
    - name: Trigger deployment via Central Control Platform
      env:
        DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
      run: |
        echo "=== Trigger deploy via central platform webhook ==="
        RESP=$(curl -s -w "\n%{http_code}" -X POST https://server.alautoai.cn/api/webhook/receive \
          -H "Content-Type: application/json" \
          -d '{
            "event": "trigger_deploy",
            "service": "horone.selforder",
            "deploy_token": "'"$DEPLOY_TOKEN"'"
          }')
        HTTP_CODE=$(echo "$RESP" | tail -1)
        BODY=$(echo "$RESP" | sed '$d')
        echo "HTTP status: $HTTP_CODE"
        echo "Response: $BODY"
        if [ "$HTTP_CODE" != "200" ]; then
          echo "❌ Deploy trigger failed!"
          exit 1
        fi
        echo "✅ Deploy triggered successfully"
    
    - name: Verify deployment
      run: |
        echo "=== Waiting for service restart ==="
        sleep 15
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://horone.alautoai.cn/health || echo "000")
        echo "Health check HTTP status: $HTTP_CODE"
        if [ "$HTTP_CODE" != "200" ]; then
          echo "⚠️  Health check not 200 (got $HTTP_CODE), may need more time"
        fi

  deploy-production:
    name: Deploy to Production
    needs: [backend-test, frontend-console-build, frontend-client-build, lint-and-format]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Trigger deployment via Central Control Platform
      env:
        DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
      run: |
        echo "=== Trigger production deploy via central platform webhook ==="
        RESP=$(curl -s -w "\n%{http_code}" -X POST https://server.alautoai.cn/api/webhook/receive \
          -H "Content-Type: application/json" \
          -d '{
            "event": "trigger_deploy",
            "service": "horone.selforder",
            "deploy_token": "'"$DEPLOY_TOKEN"'"
          }')
        HTTP_CODE=$(echo "$RESP" | tail -1)
        BODY=$(echo "$RESP" | sed '$d')
        echo "HTTP status: $HTTP_CODE"
        echo "Response: $BODY"
        if [ "$HTTP_CODE" != "200" ]; then
          echo "❌ Deploy trigger failed!"
          exit 1
        fi
        echo "✅ Production deploy triggered"
    
    - name: Verify deployment
      run: |
        echo "=== Verifying production deployment ==="
        sleep 20
        
        # 健康检查
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://horone.alautoai.cn/health || echo "000")
        echo "Health check HTTP status: $HTTP_CODE"
        if [ "$HTTP_CODE" != "200" ]; then
          echo "❌ Health check failed!"
          exit 1
        fi
        
        # 验证管理后台可访问
        ADMIN_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://horone.alautoai.cn/admin || echo "000")
        echo "Admin page HTTP status: $ADMIN_CODE"
        
        echo "✅ Production deployment verified"
    
    - name: Notification - Production Deploy Success
      if: success()
      run: |
        curl -s -X POST https://server.alautoai.cn/api/webhook/receive \
          -H "Content-Type: application/json" \
          -d '{
            "event": "production_deploy_success",
            "repository": "${{ github.repository }}",
            "branch": "${{ github.ref }}",
            "commit": "${{ github.sha }}",
            "author": "${{ github.actor }}",
            "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }' || true
    
    - name: Notification - Production Deploy Failure
      if: failure()
      run: |
        curl -s -X POST https://server.alautoai.cn/api/webhook/receive \
          -H "Content-Type: application/json" \
          -d '{
            "event": "production_deploy_failure",
            "repository": "${{ github.repository }}",
            "branch": "${{ github.ref }}",
            "commit": "${{ github.sha }}",
            "author": "${{ github.actor }}",
            "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }' || true

  notify-success:
    name: Notify - Build Success
    needs: [backend-test, frontend-console-build, frontend-client-build, lint-and-format]
    runs-on: ubuntu-latest
    if: success() && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    steps:
    - name: Notify Central Control Platform (Success)
      run: |
        curl -X POST https://server.alautoai.cn/api/webhook/receive \
          -H "Content-Type: application/json" \
          -d '{
            "event": "ci_success",
            "repository": "${{ github.repository }}",
            "branch": "${{ github.ref }}",
            "commit": "${{ github.sha }}",
            "author": "${{ github.actor }}",
            "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }'
      continue-on-error: true

  notify-failure:
    name: Notify - Build Failure
    needs: [backend-test, frontend-console-build, frontend-client-build, lint-and-format]
    runs-on: ubuntu-latest
    if: failure()
    steps:
    - name: Notify Central Control Platform (Failure)
      run: |
        curl -X POST https://server.alautoai.cn/api/webhook/receive \
          -H "Content-Type: application/json" \
          -d '{
            "event": "ci_failure",
            "repository": "${{ github.repository }}",
            "branch": "${{ github.ref }}",
            "commit": "${{ github.sha }}",
            "author": "${{ github.actor }}",
            "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }'
      continue-on-error: true
