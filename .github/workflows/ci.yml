name: Horone SelfOrder CI/CD

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  backend-test:
    name: Backend Tests (pytest + Coverage)
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_selforder
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Run tests with coverage
      working-directory: backend
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_selforder
        FLASK_ENV: testing
      run: |
        pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=60
    
    - name: Upload coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v4
      with:
        file: backend/coverage.xml
        fail_ci_if_error: false
      continue-on-error: true

  frontend-console-build:
    name: Frontend Console Build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend-console/package-lock.json
    
    - name: Install dependencies
      working-directory: frontend-console
      run: npm ci
    
    - name: Run tests (if available)
      working-directory: frontend-console
      run: npm test -- --passWithNoTests || true
    
    - name: Build
      working-directory: frontend-console
      run: npm run build
    
    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: console-dist
        path: frontend-console/dist/

  frontend-client-build:
    name: Frontend Client Build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      working-directory: frontend
      run: npm ci
    
    - name: Run tests (if available)
      working-directory: frontend
      run: npm test -- --passWithNoTests || true
    
    - name: Build
      working-directory: frontend
      run: npm run build
    
    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: client-dist
        path: frontend/dist/

  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install Python linting tools
      working-directory: backend
      run: |
        pip install flake8 black isort
    
    - name: Run flake8
      working-directory: backend
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install frontend linting tools
      run: |
        cd frontend-console && npm ci
        cd ../frontend && npm ci
    
    - name: Run ESLint (Console)
      working-directory: frontend-console
      run: npm run lint || true
    
    - name: Run ESLint (Client)
      working-directory: frontend
      run: npm run lint || true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Bandit (Python security linter)
      working-directory: backend
      run: |
        pip install bandit
        bandit -r . -ll || true
    
    - name: Run npm audit (Console)
      working-directory: frontend-console
      run: npm audit --production || true
    
    - name: Run npm audit (Client)
      working-directory: frontend
      run: npm audit --production || true

  deploy-staging:
    name: Deploy to Staging
    needs: [backend-test, frontend-console-build, frontend-client-build, lint-and-format]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download console artifacts
      uses: actions/download-artifact@v4
      with:
        name: console-dist
        path: frontend-console/dist/
    
    - name: Download client artifacts
      uses: actions/download-artifact@v4
      with:
        name: client-dist
        path: frontend/dist/
    
    - name: Deploy to Staging Server
      env:
        SSH_HOST: ${{ secrets.SSH_HOST }}
        SSH_USER: ${{ secrets.SSH_USER }}
        SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      run: |
        echo "=== Deploying to staging server ==="
        # 安装 sshpass 或使用 SSH key
        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
        
        # 打包前端构建产物
        tar -czf console-dist.tar.gz -C frontend-console/dist .
        tar -czf client-dist.tar.gz -C frontend/dist .
        
        # 上传到服务器
        scp -i ~/.ssh/deploy_key console-dist.tar.gz $SSH_USER@$SSH_HOST:$DEPLOY_PATH/
        scp -i ~/.ssh/deploy_key client-dist.tar.gz $SSH_USER@$SSH_HOST:$DEPLOY_PATH/
        
        # 在服务器上解压并重启服务（通过中央控制平台）
        ssh -i ~/.ssh/deploy_key $SSH_USER@$SSH_HOST << 'ENDSSH'
        cd $DEPLOY_PATH
        
        # 备份当前版本
        BACKUP_DIR=backups/$(date +%Y%m%d_%H%M%S)
        mkdir -p $BACKUP_DIR
        cp -r frontend-console/dist $BACKUP_DIR/ 2>/dev/null || true
        cp -r frontend/dist $BACKUP_DIR/ 2>/dev/null || true
        
        # 解压新版本
        tar -xzf console-dist.tar.gz -C frontend-console/dist/
        tar -xzf client-dist.tar.gz -C frontend/dist/
        
        # 通过中央控制平台重启服务（推荐方式）
        # curl -X POST http://localhost:8888/api/restart/horone.selforder
        
        echo "✅ Deployment completed"
        ENDSSH
        
        # 清理本地打包文件
        rm -f console-dist.tar.gz client-dist.tar.gz
    
    - name: Verify deployment
      run: |
        echo "=== Verifying deployment ==="
        # 等待服务启动
        sleep 10
        
        # 健康检查（需要替换为实际的域名）
        # curl -f https://horone.alautoai.cn/health || exit 1
        
        echo "✅ Deployment verified"

  deploy-production:
    name: Deploy to Production
    needs: [backend-test, frontend-console-build, frontend-client-build, lint-and-format]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/
    
    - name: Deploy to Production Server
      env:
        SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
        SSH_USER: ${{ secrets.PROD_SSH_USER }}
        SSH_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
        DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
      run: |
        echo "=== Deploying to PRODUCTION server ==="
        echo "⚠️  Production deployment - manual approval required"
        
        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
        
        # 打包并上传（类似 staging 流程）
        # ... (同 staging 逻辑)
        
        echo "✅ Production deployment completed"
    
    - name: Notification - Production Deploy
      if: success()
      uses: 8398a7/action-slack@v3
      with:
        status: success
        text: "🚀 Production deployed: ${{ github.sha }}"
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      continue-on-error: true

  notify-success:
    name: Notify - Build Success
    needs: [backend-test, frontend-console-build, frontend-client-build, lint-and-format]
    runs-on: ubuntu-latest
    if: success() && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    
    steps:
    - name: Webhook Notification (Success)
      uses: distributhor/workflow-webhook-action@v3
      with:
        webhookUrl: ${{ secrets.WEBHOOK_SUCCESS_URL }}
        payload: |
          {
            "text": "✅ CI/CD Passed",
            "repository": "${{ github.repository }}",
            "branch": "${{ github.ref }}",
            "commit": "${{ github.sha }}",
            "author": "${{ github.actor }}",
            "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
      continue-on-error: true
    
    - name: OpenClaw Message (if configured)
      if: env.OPENCLAW_WEBHOOK != ''
      env:
        OPENCLAW_WEBHOOK: ${{ secrets.OPENCLAW_WEBHOOK }}
      run: |
        curl -X POST "$OPENCLAW_WEBHOOK" \
          -H "Content-Type: application/json" \
          -d '{"message":"✅ CI/CD 成功 - ${{ github.ref }}"}' \
        || true

  notify-failure:
    name: Notify - Build Failure
    needs: [backend-test, frontend-console-build, frontend-client-build, lint-and-format]
    runs-on: ubuntu-latest
    if: failure()
    
    steps:
    - name: Webhook Notification (Failure)
      uses: distributhor/workflow-webhook-action@v3
      with:
        webhookUrl: ${{ secrets.WEBHOOK_FAILURE_URL }}
        payload: |
          {
            "text": "❌ CI/CD Failed",
            "repository": "${{ github.repository }}",
            "branch": "${{ github.ref }}",
            "commit": "${{ github.sha }}",
            "author": "${{ github.actor }}",
            "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
      continue-on-error: true
